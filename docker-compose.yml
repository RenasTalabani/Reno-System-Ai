version: '3.9'

# =============================================================================
# Reno System — Local Development Stack
# =============================================================================
# Services: PostgreSQL, Redis, MinIO (S3), MailHog (email), Adminer (DB UI)
# Usage:
#   docker compose up -d        Start all services
#   docker compose down         Stop all services
#   docker compose down -v      Stop and remove volumes (clean slate)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg15
    container_name: reno_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reno_dev
      POSTGRES_USER: reno
      POSTGRES_PASSWORD: reno_secret
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reno -d reno_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reno_network

  # ---------------------------------------------------------------------------
  # Redis — Cache, Sessions, Job Queue, Pub/Sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: reno_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass reno_redis_secret
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "reno_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reno_network

  # ---------------------------------------------------------------------------
  # MinIO — S3-Compatible Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: reno_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - reno_network

  # ---------------------------------------------------------------------------
  # MinIO Setup — Creates default buckets on startup
  # ---------------------------------------------------------------------------
  minio-setup:
    image: minio/mc:latest
    container_name: reno_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/reno-documents;
      mc mb --ignore-existing local/reno-media;
      mc mb --ignore-existing local/reno-exports;
      mc mb --ignore-existing local/reno-backups;
      mc mb --ignore-existing local/reno-ocr;
      mc mb --ignore-existing local/reno-ai;
      mc anonymous set download local/reno-media;
      echo 'Buckets created successfully';
      "
    networks:
      - reno_network

  # ---------------------------------------------------------------------------
  # MailHog — Local Email Server (captures all outbound emails)
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: reno_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - reno_network

  # ---------------------------------------------------------------------------
  # Adminer — Database Web UI
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: reno_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reno_network

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: reno_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.enable-admin-api
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - reno_network

  # ---------------------------------------------------------------------------
  # Grafana — Dashboards & Visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: reno_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: reno_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/reno-overview.json
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - reno_network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  reno_network:
    driver: bridge
