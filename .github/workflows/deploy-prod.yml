name: Deploy — Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Exact image tag to deploy (required)
        required: true
      confirm:
        description: Type DEPLOY to confirm production deployment
        required: true

permissions:
  contents: read
  packages: write

jobs:
  gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "Confirmation not provided. Aborting."
            exit 1
          fi

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: gate
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/api:latest

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.PROD_API_URL }}
            NEXT_PUBLIC_APP_VERSION=${{ steps.tag.outputs.tag }}

      - name: Run DB migrations (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/reno
            IMAGE_TAG=${{ steps.tag.outputs.tag }} docker compose -f docker-compose.prod.yml pull api
            IMAGE_TAG=${{ steps.tag.outputs.tag }} docker compose -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL="${DATABASE_URL}" api \
              sh -c "cd /app && node -e \"require('./dist/scripts/run-migrations.js')\""

      - name: Blue-green deploy (rolling update with zero downtime)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/reno
            # Pull new images
            IMAGE_TAG=${{ steps.tag.outputs.tag }} docker compose -f docker-compose.prod.yml pull
            # Rolling update: start-first ensures zero downtime (maxSurge=1, maxUnavailable=0)
            IMAGE_TAG=${{ steps.tag.outputs.tag }} docker compose -f docker-compose.prod.yml up -d --no-build

      - name: Health check production
        run: |
          echo "Verifying production health..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PROD_API_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production healthy after ${i}x10s"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS"
            sleep 10
          done
          echo "Production health check FAILED — triggering rollback"
          # Notify via GitHub Actions failure
          exit 1

      - name: Record deployment log
        if: success()
        run: |
          curl -s -X POST "${{ vars.PROD_API_URL }}/v1/deployment/log" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PROD_DEPLOY_TOKEN }}" \
            -d '{
              "version": "${{ steps.tag.outputs.tag }}",
              "environment": "production",
              "strategy": "rolling",
              "commitSha": "${{ github.sha }}",
              "branch": "master",
              "deployedBy": "${{ github.actor }}",
              "healthCheckPassed": true,
              "migrationRan": true,
              "testsPassed": true
            }' || true
