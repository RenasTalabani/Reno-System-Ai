name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.13.0'

# ─── Jobs ──────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Install & Cache ───────────────────────────────────────────────────────
  setup:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

  # ── 2. Lint & Typecheck ──────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Type check all packages
        run: pnpm typecheck

  # ── 3. Unit Tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    env:
      JWT_ACCESS_SECRET: test-access-secret-ci-32chars-min
      JWT_REFRESH_SECRET: test-refresh-secret-ci-32chars-min
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (@reno/core)
        run: pnpm --filter @reno/core test:coverage

      - name: Run unit tests (@reno/auth)
        run: pnpm --filter @reno/auth test:coverage

      - name: Upload coverage — core
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-core
          path: packages/core/coverage/
          retention-days: 7

      - name: Upload coverage — auth
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-auth
          path: packages/auth/coverage/
          retention-days: 7

  # ── 4. API Integration Tests ──────────────────────────────────────────────────
  integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: setup

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reno
          POSTGRES_PASSWORD: reno_dev_pass
          POSTGRES_DB: reno_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://reno:reno_dev_pass@localhost:5432/reno_test
      JWT_ACCESS_SECRET: test-access-secret-ci-32chars-min
      JWT_REFRESH_SECRET: test-refresh-secret-ci-32chars-min
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run database migrations
        run: pnpm --filter @reno/database db:migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed demo tenant
        run: pnpm --filter @reno/database db:seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run API integration tests
        run: pnpm --filter @reno/api test:coverage

      - name: Upload coverage — api
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-api
          path: apps/api/test-results/
          retention-days: 7

  # ── 5. Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build packages
        run: pnpm build

      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next
            apps/api/dist
            packages/*/dist
          key: ${{ runner.os }}-build-${{ github.sha }}

  # ── 6. E2E Tests ──────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reno
          POSTGRES_PASSWORD: reno_dev_pass
          POSTGRES_DB: reno_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://reno:reno_dev_pass@localhost:5432/reno_e2e
      JWT_ACCESS_SECRET: test-access-secret-ci-32chars-min
      JWT_REFRESH_SECRET: test-refresh-secret-ci-32chars-min
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run database migrations + seed
        run: |
          pnpm --filter @reno/database db:migrate
          pnpm --filter @reno/database db:seed

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next
            apps/api/dist
            packages/*/dist
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Start API server
        run: |
          node apps/api/dist/server.js &
          echo "API_PID=$!" >> $GITHUB_ENV
          sleep 5
        env:
          PORT: 4000
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_ACCESS_SECRET: ${{ env.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}

      - name: Start Web server
        run: |
          pnpm --filter @reno/web start &
          echo "WEB_PID=$!" >> $GITHUB_ENV
          sleep 10
        env:
          PORT: 3000
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}

      - name: Wait for services
        run: |
          npx wait-on http://localhost:4000/health http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: pnpm --filter @reno/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  # ── 7. Coverage Report ────────────────────────────────────────────────────────
  coverage-report:
    name: Aggregate Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download core coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-core
          path: coverage/core/
        continue-on-error: true

      - name: Download auth coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-auth
          path: coverage/auth/
        continue-on-error: true

      - name: Download api coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-api
          path: coverage/api/
        continue-on-error: true

      - name: Coverage summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          for pkg in core auth api; do
            if [ -d "coverage/$pkg" ]; then
              echo "| @reno/$pkg | ✅ Available |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| @reno/$pkg | ⚠️ Not generated |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ── 8. CI Status Gate ─────────────────────────────────────────────────────────
  ci-status:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, integration-tests, build]
    if: always()
    steps:
      - name: Check all required jobs
        run: |
          if [[ "${{ needs.quality.result }}" != "success" ]]; then
            echo "Quality checks failed"
            exit 1
          fi
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build failed"
            exit 1
          fi
          echo "All CI checks passed ✅"
