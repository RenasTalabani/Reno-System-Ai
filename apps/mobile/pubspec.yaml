name: reno_mobile
description: Reno System Mobile — AI-First Business Operating System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.3

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Offline cache
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8

  # Connectivity
  connectivity_plus: ^6.0.3

  # Permissions
  permission_handler: ^11.3.1

  # Date formatting
  intl: ^0.19.0

  # Push notifications (foundation)
  flutter_local_notifications: ^17.1.2

  # Barcode scanning (inventory / attendance)
  mobile_scanner: ^5.1.1

  # File / media
  image_picker: ^1.1.2
  file_picker: ^8.0.7

  # Deep links / launcher
  url_launcher: ^6.3.0

  # Device info
  package_info_plus: ^8.1.0
  device_info_plus: ^10.1.0

  # Preferences (non-sensitive)
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
