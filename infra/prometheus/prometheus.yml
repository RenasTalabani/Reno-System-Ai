global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: reno
    environment: development

rule_files:
  - alert-rules.yml

scrape_configs:
  # Reno API — main application metrics
  - job_name: reno_api
    static_configs:
      - targets: ['host.docker.internal:4000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Redis exporter (if redis_exporter is added later)
  # - job_name: redis
  #   static_configs:
  #     - targets: ['redis_exporter:9121']

  # PostgreSQL exporter (if pg_exporter is added later)
  # - job_name: postgres
  #   static_configs:
  #     - targets: ['pg_exporter:9187']
