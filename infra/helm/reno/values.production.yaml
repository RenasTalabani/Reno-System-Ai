# Production overrides — critical settings, resource bumps
global:
  imageTag: "" # Must be set explicitly: --set global.imageTag=v1.2.3

api:
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "4"
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60

web:
  replicaCount: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi

ingress:
  hosts:
    api: api.reno.app
    web: app.reno.app
