apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  BACKUP_ENCRYPTION_KEY: {{ .Values.secrets.backupEncryptionKey | quote }}
  RESTORE_APPROVAL_TOKEN: {{ .Values.secrets.restoreApprovalToken | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
