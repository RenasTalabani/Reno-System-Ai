# =============================================================================
# Reno Helm Chart — Default Values
# =============================================================================

global:
  imageRegistry: ghcr.io
  imageRepository: reno-system/reno
  imageTag: latest
  imagePullPolicy: Always
  namespace: reno-system

api:
  replicaCount: 2
  image:
    name: api
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    NODE_ENV: production
    PORT: "4000"
    HOST: "0.0.0.0"
    OTEL_ENABLED: "true"

web:
  replicaCount: 2
  image:
    name: web
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  env:
    NODE_ENV: production
    PORT: "3000"

ingress:
  enabled: true
  className: nginx
  tls: true
  certIssuer: letsencrypt-prod
  hosts:
    api: api.reno.example.com
    web: reno.example.com

# Secrets — set via --set or external secret manager
secrets:
  databaseUrl: ""
  redisUrl: ""
  jwtSecret: ""
  jwtRefreshSecret: ""
  encryptionKey: ""
  backupEncryptionKey: ""
  restoreApprovalToken: ""
  openaiApiKey: ""
