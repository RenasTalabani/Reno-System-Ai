version: "3.9"

# =============================================================================
# Reno System — Staging Docker Compose
# Lighter resource limits; single replicas; test data seeding allowed.
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reno_staging}
      POSTGRES_USER: ${POSTGRES_USER:-reno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - reno_staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reno} -d ${POSTGRES_DB:-reno_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_staging_data:/data
    networks:
      - reno_staging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging: *default-logging

  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-reno-system/reno}/api:${IMAGE_TAG:-staging}
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-reno}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reno_staging}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY}
      RESTORE_APPROVAL_TOKEN: ${RESTORE_APPROVAL_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_ENABLED: "false"
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reno_staging
    ports:
      - "4001:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    logging: *default-logging

  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-reno-system/reno}/web:${IMAGE_TAG:-staging}
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4001}
        NEXT_PUBLIC_APP_VERSION: ${IMAGE_TAG:-staging}
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - reno_staging
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging: *default-logging

volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local

networks:
  reno_staging:
    driver: bridge
